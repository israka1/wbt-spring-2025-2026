<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio - Contact</title>
    <link rel="stylesheet" href="../styles/contact.css">
</head>
<body>
    <header>
        <h1 class="site-name">ISRAK AHMED</h1>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="educations.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Contact Me</h2>
        <form method="post">
            <fieldset>
                <legend>Contact Information</legend>
                <table>
                    <tr>
                        <td><label for="name">Name:</label></td>
                        <td><input type="text" id="name" name="name" required></td>
                    </tr>
                    <tr>
                        <td><label for="email">Email:</label></td>
                        <td><input type="email" id="email" name="email" required></td>
                    </tr>
                    <tr>
                        <td><label>Gender:</label></td>
                        <td>
                            <input type="radio" name="gender" value="male"> Male
                            <input type="radio" name="gender" value="female"> Female
                        </td>
                    </tr>
                    <tr>
                        <td><label>Skills:</label></td>
                        <td>
                            <input type="checkbox" value="html"> HTML
                            <input type="checkbox" value="css"> CSS
                            <input type="checkbox" value="js"> JavaScript
                            <input type="checkbox" value="python"> Python
                        </td>
                    </tr>
                    <tr>
                        <td><label for="country">Country:</label></td>
                        <td>
                            <select id="country" name="country">
                                <option>Bangladesh</option>
                                <option>India</option>
                                <option>USA</option>
                                <option>UK</option>
                            </select>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="msg">Message:</label></td>
                        <td>
                            <textarea id="msg" rows="4" cols="30"></textarea>
                        </td>
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input type="submit" value="Send">
                            <input type="reset">
                       </td>
                    </tr>
                </table>
            </fieldset>
        </form>
        <br>
        <a href="../index.html">Back to Home</a>
    </main>
    <footer>
        <div class="social-links">
            <a href="https://www.facebook.com/fakenirjon" target="_blank" rel="noopener noreferrer">
                <img src="../resources/fb.png" alt="Facebook">
            </a>
            <a href="https://www.linkedin.com/feed/" target="_blank" rel="noopener noreferrer">
                <img src="../resources/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://github.com/israka1" target="_blank" rel="noopener noreferrer">
                <img src="../resources/githubpng.png" alt="GitHub">
            </a>
        </div>
    </footer>
</body>
</html>
